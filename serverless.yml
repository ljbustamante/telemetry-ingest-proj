
service: telemetry-ingest-python
frameworkVersion: '4'
provider:
  name: aws
  runtime: python3.13
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'dev'}
  memorySize: 512
  timeout: 10
  environment:
    TELEMETRY_QUEUE_URL: ${self:custom.queueUrl.${sls:stage}}
    DB_HOST: ${env:DB_HOST, ssm:/cn-telemetry/${sls:stage}/db/host~true}
    DB_PORT: ${env:DB_PORT, ssm:/cn-telemetry/${sls:stage}/db/port~true}
    DB_NAME: ${env:DB_NAME, ssm:/cn-telemetry/${sls:stage}/db/name~true}
    DB_USER: ${env:DB_USER, ssm:/cn-telemetry/${sls:stage}/db/user~true}
    DB_PASSWORD: ${env:DB_PASSWORD, ssm:/cn-telemetry/${sls:stage}/db/password~true}
    ENV: ${sls:stage, env:ENV}
    LOG_LEVEL: ${env:LOG_LEVEL, 'INFO'}
    CURATION_HTTP_SECRET: ${env:CURATION_HTTP_SECRET, ''}
    CURATION_BATCH_SIZE: ${env:CURATION_BATCH_SIZE, '500'}
    ML_HTTP_SECRET: ${env:ML_HTTP_SECRET, ''}
    ML_AUTO_INCIDENT_ENABLED: ${env:ML_AUTO_INCIDENT_ENABLED, 'false'}
    ML_AUTO_INCIDENT_MIN_LEVEL: ${env:ML_AUTO_INCIDENT_MIN_LEVEL, 'Alto'}
    ML_RISK_LOOKBACK_DAYS: ${env:ML_RISK_LOOKBACK_DAYS, '30'}
    ML_MAX_SNAPSHOTS_PER_DEVICE: ${env:ML_MAX_SNAPSHOTS_PER_DEVICE, '5000'}
    ML_MODEL_NAME: ${env:ML_MODEL_NAME, 'device_risk_if'}
    ML_MODEL_VERSION: ${env:ML_MODEL_VERSION, '1'}
    ML_HORIZON_MINUTES: ${env:ML_HORIZON_MINUTES, '60'}
    ML_MIN_SNAPSHOTS: ${env:ML_MIN_SNAPSHOTS, '5'}
    ML_RECENT_WINDOW: ${env:ML_RECENT_WINDOW, '50'}
    ML_SKLEARN_N_JOBS: ${env:ML_SKLEARN_N_JOBS, '1'}
    JWT_SECRET: ${env:JWT_SECRET, ''}
    ALERT_EMAIL_FROM: ${env:ALERT_EMAIL_FROM, ''}
    ALERT_EMAIL_TO: ${env:ALERT_EMAIL_TO, ''}
    JOB_FAILURE_EMAIL_TO: ${env:JOB_FAILURE_EMAIL_TO, ''}
    ALERT_DIGEST_SECRET: ${env:ALERT_DIGEST_SECRET, ''}
    S3_BUCKET: ${env:S3_BUCKET, 'cnagent-ml-data'}
    AUTO_TICKET_THRESHOLD: ${env:AUTO_TICKET_THRESHOLD, '0.72'}
    # Comma-separated allowed Origins; if the request Origin matches, it is echoed and
    # Access-Control-Allow-Credentials is set (needed with fetch credentials / cookies).
    # Default * = no credentials with cross-origin. For local Vite + credentials use e.g.:
    # CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
    CORS_ALLOWED_ORIGINS: ${env:CORS_ALLOWED_ORIGINS, '*'}
  # CORS a nivel de HTTP API: OPTIONS (preflight) sin ruta explícita y cabeceras en respuestas.
  # AWS ignora las cabeceras CORS que devuelva la Lambda cuando aplica esta config (sin duplicar).
  # Mantén CORS en código para local/tests y para alinear Allow-Headers con el front.
  httpApi:
    cors:
      allowedOrigins:
        - '*'
      allowedHeaders:
        - Content-Type
        - Authorization
        - Accept
        - Origin
        - X-Requested-With
        - X-Internal-Key
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      maxAge: 300
  iamRoleStatements:
    - Effect: Allow
      Action: [sqs:SendMessage]
      Resource: { "Fn::GetAtt": ["TelemetryQueue", "Arn"] }
    - Effect: Allow
      Action:
        - ssm:GetParameter
        - ssm:GetParameters
        - ssm:GetParametersByPath
      Resource: "arn:aws:ssm:${aws:region}:${aws:accountId}:parameter/cn-telemetry/*"
    - Effect: Allow
      Action: [s3:PutObject]
      Resource: "arn:aws:s3:::${env:S3_BUCKET, 'cnagent-ml-data'}/tickets/*"
    - Effect: Allow
      Action: [ses:SendEmail, ses:SendRawEmail]
      Resource: "*"
plugins:
  # - serverless-python-requirements
  # - serverless-dotenv-plugin
custom:
  # VPC anchor: shared by Lambdas that need RDS (functions use vpc: *rds_vpc).
  # httpIngest stays out of the VPC — SQS without NAT/VPC endpoint would hang.
  # Anchor lives under custom because Serverless v4 rejects unknown root keys (e.g. x-rds-vpc).
  rdsVpc: &rds_vpc
    securityGroupIds:
      - sg-088776f8785a95a21
    subnetIds:
      - subnet-0ef7053a7b89886c7
      - subnet-06f9eebd45c60931a
      - subnet-08e2e5b6c49522ed2
      - subnet-0ac67d83feabf42e3
      - subnet-0a7f09383b0caffec
      - subnet-04b27fd1a699af324
  # Physical Lambda name prefix for dashboard APIs (GUIA).
  frontLambdaNamePrefix: ${self:service}-front-${sls:stage}-
  # isLocal: ${strEquals(${sls:stage}, 'local')}
  accountId: ${env:AWS_ACCOUNT_ID, '000000000000'}
  queueUrl:
    local: ${env:TELEMETRY_QUEUE_URL, 'http://localhost:4566/000000000000/telemetry.fifo'}
    dev: { Ref: TelemetryQueue }
    prod: { Ref: TelemetryQueue }
  pythonRequirements:
    slim: true
    strip: true
    dockerizePip: true
    # Docker chowns the download cache to root; a failed run leaves dirs root-owned and
    # the next deploy fails opening downloadCacheslspyc/requirements.txt on the host.
    useDownloadCache: false
    # boto3/botocore are provided by the Lambda Python runtime — no need to ship them.
    noDeploy:
      - boto3
      - botocore
      - s3transfer
      - jmespath
package:
  patterns:
    - '!layers/**'
    - '!scripts/**'
    - '!env/**'
    - '!*.zip'
    - '!.env'
    - '!.env.*'
    - '!.coverage'
    - '!.cursor/**'
    - '!.claude/**'
    - '!.pytest_cache/**'
    - '!tests/**'
    - '!docs/**'
    - '!migrations/**'
    - '!events/**'
    - '!features.py'
    - '!train_model.py'
    - '!list_db_tables.py'
    - '!requirements*.txt'
    - '!*.json'
    - '!docker-compose.yml'
    - '!pyproject.toml'
    - '!README.md'
    - 'src/**'
# ML wheels (numpy/scipy/pandas/sklearn) — build with: bash scripts/build_ml_scipy_layer.sh
# Slimmed in that script to stay under the 250 MiB unzipped limit with the function package.
layers:
  mlDeps:
    path: layers/ml-deps
    name: ${self:service}-${sls:stage}-ml-deps
    description: numpy scipy pandas scikit-learn for mlRiskJob
    compatibleRuntimes:
      - python3.13
functions:
  httpIngest:
    handler: src/entrypoints/http/handlers.http_ingest
    events:
      - httpApi: { method: POST, path: /telemetry }
      - httpApi: { method: GET,  path: /health }
  sqsConsumer:
    handler: src/entrypoints/sqs/consumer.handle
    timeout: 60
    memorySize: 1024
    vpc: *rds_vpc
    events:
      - sqs:
          arn: { "Fn::GetAtt": ["TelemetryQueue", "Arn"] }
  curationEtl:
    handler: src/entrypoints/aws/curation_handler.handle
    timeout: 120
    memorySize: 1024
    vpc: *rds_vpc
    events:
      - schedule: rate(10 minutes)
      - httpApi: { method: POST, path: /internal/curation/run }
      - httpApi: { method: GET, path: /internal/curation/run }
  mlRiskJob:
    handler: src/entrypoints/aws/ml_risk_handler.handle
    timeout: 900
    memorySize: 3008
    vpc: *rds_vpc
    layers:
      - { Ref: MlDepsLambdaLayer }
    events:
      - schedule: rate(1 day)
      - httpApi: { method: POST, path: /internal/ml-risk/run }
      - httpApi: { method: GET, path: /internal/ml-risk/run }
  frontAuthLogin:
    name: ${self:custom.frontLambdaNamePrefix}auth-login
    handler: src/entrypoints/http/front/auth_login.handle
    timeout: 15
    vpc: *rds_vpc
    events:
      - httpApi: { method: POST, path: /auth/login }
      - httpApi: { method: OPTIONS, path: /auth/login }
  frontDevicesList:
    name: ${self:custom.frontLambdaNamePrefix}devices-list
    handler: src/entrypoints/http/front/devices_list.handle
    timeout: 29
    vpc: *rds_vpc
    events:
      - httpApi: { method: GET, path: /devices }
      - httpApi: { method: OPTIONS, path: /devices }
  frontDevicesGet:
    name: ${self:custom.frontLambdaNamePrefix}devices-get
    handler: src/entrypoints/http/front/devices_get.handle
    timeout: 15
    vpc: *rds_vpc
    events:
      - httpApi: { method: GET, path: '/devices/{device_id}' }
      - httpApi: { method: OPTIONS, path: '/devices/{device_id}' }
  frontDeviceMetrics:
    name: ${self:custom.frontLambdaNamePrefix}device-metrics
    handler: src/entrypoints/http/front/metrics_device.handle
    timeout: 29
    vpc: *rds_vpc
    events:
      - httpApi: { method: GET, path: '/devices/{device_id}/metrics' }
      - httpApi: { method: OPTIONS, path: '/devices/{device_id}/metrics' }
  frontDashboardSummary:
    name: ${self:custom.frontLambdaNamePrefix}dashboard-summary
    handler: src/entrypoints/http/front/metrics_dashboard.handle
    timeout: 15
    vpc: *rds_vpc
    events:
      - httpApi: { method: GET, path: /dashboard/summary }
      - httpApi: { method: OPTIONS, path: /dashboard/summary }
  frontDashboardAlertTrend:
    name: ${self:custom.frontLambdaNamePrefix}dashboard-alert-trend
    handler: src/entrypoints/http/front/dashboard_alert_trend.handle
    timeout: 29
    vpc: *rds_vpc
    events:
      - httpApi: { method: GET, path: /dashboard/alert-trend }
      - httpApi: { method: OPTIONS, path: /dashboard/alert-trend }
  frontAlertsList:
    name: ${self:custom.frontLambdaNamePrefix}alerts-list
    handler: src/entrypoints/http/front/alerts_list.handle
    timeout: 15
    vpc: *rds_vpc
    events:
      - httpApi: { method: GET, path: /alerts }
      - httpApi: { method: OPTIONS, path: /alerts }
  frontTicketsCrud:
    name: ${self:custom.frontLambdaNamePrefix}tickets-crud
    handler: src/entrypoints/http/front/tickets_crud.handle
    timeout: 15
    vpc: *rds_vpc
    events:
      - httpApi: { method: GET, path: /tickets }
      - httpApi: { method: PATCH, path: '/tickets/{ticket_id}/close' }
      - httpApi: { method: DELETE, path: '/tickets/{ticket_id}' }
      - httpApi: { method: OPTIONS, path: /tickets }
      - httpApi: { method: OPTIONS, path: '/tickets/{ticket_id}/close' }
      - httpApi: { method: OPTIONS, path: '/tickets/{ticket_id}' }
  frontTicketsExport:
    name: ${self:custom.frontLambdaNamePrefix}tickets-export
    handler: src/entrypoints/http/front/tickets_export.handle
    timeout: 60
    memorySize: 512
    vpc: *rds_vpc
    events:
      - httpApi: { method: GET, path: /tickets/export }
      - httpApi: { method: OPTIONS, path: /tickets/export }
  frontUsersCrud:
    name: ${self:custom.frontLambdaNamePrefix}users-crud
    handler: src/entrypoints/http/front/users_crud.handle
    timeout: 15
    vpc: *rds_vpc
    events:
      - httpApi: { method: GET,    path: /users }
      - httpApi: { method: POST,   path: /users }
      - httpApi: { method: PUT,    path: '/users/{id}' }
      - httpApi: { method: PATCH,  path: '/users/{id}/active' }
      - httpApi: { method: DELETE, path: '/users/{id}' }
      - httpApi: { method: OPTIONS, path: /users }
      - httpApi: { method: OPTIONS, path: '/users/{id}' }
      - httpApi: { method: OPTIONS, path: '/users/{id}/active' }
  frontCustomersCrud:
    name: ${self:custom.frontLambdaNamePrefix}customers-crud
    handler: src/entrypoints/http/front/customers_crud.handle
    timeout: 15
    vpc: *rds_vpc
    events:
      - httpApi: { method: GET,    path: /customers }
      - httpApi: { method: POST,   path: /customers }
      - httpApi: { method: PUT,    path: '/customers/{id}' }
      - httpApi: { method: DELETE, path: '/customers/{id}' }
      - httpApi: { method: OPTIONS, path: /customers }
      - httpApi: { method: OPTIONS, path: '/customers/{id}' }
  frontSitesCrud:
    name: ${self:custom.frontLambdaNamePrefix}sites-crud
    handler: src/entrypoints/http/front/sites_crud.handle
    timeout: 15
    vpc: *rds_vpc
    events:
      - httpApi: { method: GET,    path: '/customers/{customer_id}/sites' }
      - httpApi: { method: POST,   path: '/customers/{customer_id}/sites' }
      - httpApi: { method: PUT,    path: '/sites/{id}' }
      - httpApi: { method: DELETE, path: '/sites/{id}' }
      - httpApi: { method: OPTIONS, path: '/customers/{customer_id}/sites' }
      - httpApi: { method: OPTIONS, path: '/sites/{id}' }
  alertDigestJob:
    handler: src/entrypoints/aws/alert_digest_handler.handle
    timeout: 60
    memorySize: 512
    vpc: *rds_vpc
    events:
      - schedule: cron(0 8 * * ? *)
      - httpApi: { method: POST, path: /internal/alert-digest/run }
      - httpApi: { method: GET,  path: /internal/alert-digest/run }
  frontDeviceAssignmentsCrud:
    name: ${self:custom.frontLambdaNamePrefix}device-assignments-crud
    handler: src/entrypoints/http/front/device_assignments_crud.handle
    timeout: 15
    vpc: *rds_vpc
    events:
      - httpApi: { method: GET,   path: '/sites/{site_id}/device-assignments' }
      - httpApi: { method: POST,  path: '/sites/{site_id}/device-assignments' }
      - httpApi: { method: PATCH, path: '/device-assignments/{id}/unassign' }
      - httpApi: { method: OPTIONS, path: '/sites/{site_id}/device-assignments' }
      - httpApi: { method: OPTIONS, path: '/device-assignments/{id}/unassign' }
resources:
  Resources:
    TelemetryQueue:
      Type: AWS::SQS::Queue
      Properties:
        FifoQueue: true
        ContentBasedDeduplication: true
        QueueName: ${self:service}-${sls:stage}.fifo
        VisibilityTimeout: 120
        RedrivePolicy:
          deadLetterTargetArn: { "Fn::GetAtt": ["TelemetryDLQ", "Arn"] }
          maxReceiveCount: 5
    TelemetryDLQ:
      Type: AWS::SQS::Queue
      Properties:
        FifoQueue: true
        ContentBasedDeduplication: true
        QueueName: ${self:service}-${sls:stage}-dlq.fifo
  Outputs:
    TelemetryQueueUrl:
      Value: { "Ref": "TelemetryQueue" }
