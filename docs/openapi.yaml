openapi: 3.0.3
info:
  title: CNAgent Telemetry & Dashboard HTTP API
  description: |
    Contratos alineados con serverless.yml y GUIA_LAMBDAS_AWS.txt.

    **Base URL:** sustituye el host por el de tu API Gateway HTTP API.

    **CORS:** las rutas del dashboard responden a OPTIONS con 200 y cabeceras CORS.

    **Errores del dashboard:** cuerpo JSON {"detail": "<mensaje>"}.
  version: "1.1.0"

servers:
  - url: "https://{apiId}.execute-api.{region}.amazonaws.com"
    description: API Gateway HTTP API
    variables:
      apiId:
        default: your-http-api-id
      region:
        default: eu-west-1

tags:
  - name: Ingest
    description: Ingesta de telemetría (agente)
  - name: Health
  - name: InternalOps
    description: ETL curation y job ML (cabecera X-Internal-Key)
  - name: FrontAuth
  - name: FrontDevices
  - name: FrontMetrics
  - name: FrontAlertsTickets
  - name: FrontCustomers
    description: CRUD de clientes
  - name: FrontSites
    description: CRUD de ubicaciones por cliente
  - name: FrontAssignments
    description: Asignación y desasignación de equipos a ubicaciones
  - name: FrontUsers
    description: CRUD de usuarios (solo superadmin)

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true

  /telemetry:
    post:
      tags: [Ingest]
      summary: Ingestar snapshot de telemetría
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelemetryIngestFlexible"
      responses:
        "202":
          description: Aceptado
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: accepted
        "400":
          description: Payload inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestError"

  /internal/curation/run:
    get:
      tags: [InternalOps]
      summary: Ping servicio curation ETL
      security: []
      responses:
        "200":
          description: Servicio vivo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalPing"
    post:
      tags: [InternalOps]
      summary: Ejecutar batch de curación
      security:
        - internalApiKey: []
      responses:
        "200":
          description: Estadísticas del batch
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403":
          description: Clave interna incorrecta o ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalError"
        "503":
          description: CURATION_HTTP_SECRET no configurado en el entorno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalError"

  /internal/ml-risk/run:
    get:
      tags: [InternalOps]
      summary: Ping job ML riesgo
      security: []
      responses:
        "200":
          description: Servicio vivo
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
                    example: ml-risk-job
    post:
      tags: [InternalOps]
      summary: Ejecutar job ML riesgo de dispositivos
      security:
        - internalApiKey: []
      responses:
        "200":
          description: Estadísticas del job
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403":
          description: Clave interna incorrecta o ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalError"
        "503":
          description: ML_HTTP_SECRET no configurado en el entorno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalError"

  /auth/login:
    post:
      tags: [FrontAuth]
      summary: Login y JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Token y usuario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
        "422":
          description: email y password requeridos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"

  /devices:
    get:
      tags: [FrontDevices]
      summary: Listar dispositivos (no RETIRED)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Array de dispositivos con última lectura curated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeviceListRow"
        "401":
          $ref: "#/components/responses/Unauthorized"

  "/devices/{device_id}":
    get:
      tags: [FrontDevices]
      summary: Detalle dispositivo + hardware + predicción ML
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/deviceId"
      responses:
        "200":
          description: Dispositivo encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Equipo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"

  "/devices/{device_id}/metrics":
    get:
      tags: [FrontMetrics]
      summary: Métricas agregadas por hora
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/deviceId"
        - name: hours
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 168
            default: 24
          description: Ventana hacia atrás en horas
      responses:
        "200":
          description: Serie temporal por hora
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeviceMetricBucket"
        "400":
          description: device_id requerido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /dashboard/summary:
    get:
      tags: [FrontMetrics]
      summary: Resumen dashboard (conteos riesgo, alertas, altas)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Conteos agregados para el dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /dashboard/alert-trend:
    get:
      tags: [FrontMetrics]
      summary: Serie 6h CPU/temp/batería (ACTIVE)
      security:
        - bearerAuth: []
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 90
            default: 7
          description: Ventana en días hacia atrás desde ahora
      responses:
        "200":
          description: Puntos de serie por ventana de 6 horas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlertTrendPoint"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /alerts:
    get:
      tags: [FrontAlertsTickets]
      summary: Alertas ML recientes (24h)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de predicciones / alertas recientes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlertRow"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /tickets:
    get:
      tags: [FrontAlertsTickets]
      summary: Listar tickets / incidencias
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de incidencias
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TicketRow"
        "401":
          $ref: "#/components/responses/Unauthorized"

  "/tickets/{ticket_id}/close":
    patch:
      tags: [FrontAlertsTickets]
      summary: Cerrar ticket con outcome (Ground Truth)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ticketId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloseTicketRequest"
      responses:
        "200":
          description: Ticket cerrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  outcome:
                    type: string
                    enum: [confirmed_failure, false_positive]
                  closed_at:
                    type: string
                    format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: outcome o failure_type inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"

  "/tickets/{ticket_id}":
    delete:
      tags: [FrontAlertsTickets]
      summary: Eliminar ticket abierto (no borrar si hay ml_feedback)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ticketId"
      responses:
        "204":
          description: Eliminado
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Ticket no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
        "409":
          description: Ticket cerrado con feedback — no eliminable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"

  /tickets/export:
    get:
      tags: [FrontAlertsTickets]
      summary: Exportar CSV de tickets cerrados con outcome
      security:
        - bearerAuth: []
      responses:
        "200":
          description: CSV adjunto
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: Error al generar CSV o subir a S3
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"

  # -------------------------------------------------------------------------
  # Users (solo superadmin)
  # -------------------------------------------------------------------------
  /users:
    get:
      tags: [FrontUsers]
      summary: Listar usuarios (solo superadmin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Array de usuarios sin password_hash
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [FrontUsers]
      summary: Crear usuario (solo superadmin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRequest"
      responses:
        "201":
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Email duplicado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
        "422":
          description: Campos faltantes, rol inválido o email inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"

  "/users/{id}":
    put:
      tags: [FrontUsers]
      summary: Actualizar usuario (solo superadmin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/genericId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateRequest"
      responses:
        "200":
          description: Usuario actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
        "409":
          description: Email en uso por otro usuario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
    delete:
      tags: [FrontUsers]
      summary: Eliminar usuario (solo superadmin; no elimina el último superadmin activo)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/genericId"
      responses:
        "204":
          description: Eliminado
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
        "409":
          description: No se puede eliminar el único superadmin activo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"

  "/users/{id}/active":
    patch:
      tags: [FrontUsers]
      summary: Activar o desactivar usuario (solo superadmin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/genericId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserActiveRequest"
      responses:
        "200":
          description: Usuario con estado actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"

  # -------------------------------------------------------------------------
  # Customers
  # -------------------------------------------------------------------------
  /customers:
    get:
      tags: [FrontCustomers]
      summary: Listar todos los clientes
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Array de clientes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [FrontCustomers]
      summary: Crear cliente
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerRequest"
      responses:
        "201":
          description: Cliente creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Ya existe un cliente con ese code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
        "422":
          description: Campos requeridos faltantes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"

  "/customers/{id}":
    put:
      tags: [FrontCustomers]
      summary: Actualizar cliente
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/genericId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdateRequest"
      responses:
        "200":
          description: Cliente actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Cliente no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
        "409":
          description: El code ya existe en otro cliente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
    delete:
      tags: [FrontCustomers]
      summary: Eliminar cliente (falla si tiene ubicaciones)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/genericId"
      responses:
        "204":
          description: Eliminado
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Cliente no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
        "409":
          description: El cliente tiene ubicaciones asociadas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"

  # -------------------------------------------------------------------------
  # Sites
  # -------------------------------------------------------------------------
  "/customers/{customer_id}/sites":
    get:
      tags: [FrontSites]
      summary: Listar ubicaciones del cliente
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/customerId"
      responses:
        "200":
          description: Array de ubicaciones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Site"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Cliente no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
    post:
      tags: [FrontSites]
      summary: Crear ubicación para el cliente
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/customerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteRequest"
      responses:
        "201":
          description: Ubicación creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Site"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Cliente no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
        "422":
          description: Campos requeridos faltantes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"

  "/sites/{id}":
    put:
      tags: [FrontSites]
      summary: Actualizar ubicación
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/genericId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteUpdateRequest"
      responses:
        "200":
          description: Ubicación actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Site"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Ubicación no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
    delete:
      tags: [FrontSites]
      summary: Eliminar ubicación (falla si tiene equipos asignados activos)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/genericId"
      responses:
        "204":
          description: Eliminada
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Ubicación no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
        "409":
          description: La ubicación tiene equipos asignados activos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"

  # -------------------------------------------------------------------------
  # Device Assignments
  # -------------------------------------------------------------------------
  "/sites/{site_id}/device-assignments":
    get:
      tags: [FrontAssignments]
      summary: Listar asignaciones activas de la ubicación
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/siteId"
      responses:
        "200":
          description: Array de asignaciones activas (unassigned_at IS NULL)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeviceAssignmentRow"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [FrontAssignments]
      summary: Asignar equipo a la ubicación
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/siteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_id]
              properties:
                device_id:
                  type: string
                  format: uuid
      responses:
        "201":
          description: Asignación creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceAssignmentRow"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Ubicación o equipo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
        "409":
          description: El equipo ya tiene una asignación activa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"

  "/device-assignments/{id}/unassign":
    patch:
      tags: [FrontAssignments]
      summary: Desasignar equipo (setea unassigned_at)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/genericId"
      responses:
        "200":
          description: Asignación cerrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceAssignmentRow"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Asignación no encontrada o ya desasignada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Cabecera HTTP Authorization con esquema Bearer y el JWT devuelto por POST /auth/login.
    internalApiKey:
      type: apiKey
      in: header
      name: X-Internal-Key
      description: >-
        Debe coincidir con la variable de entorno CURATION_HTTP_SECRET o ML_HTTP_SECRET
        según la ruta invocada.

  parameters:
    deviceId:
      name: device_id
      in: path
      required: true
      schema:
        type: string
    ticketId:
      name: ticket_id
      in: path
      required: true
      schema:
        type: string
    genericId:
      name: id
      in: path
      required: true
      schema:
        type: string
    customerId:
      name: customer_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    siteId:
      name: site_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Sin JWT válido
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DetailError"
          example:
            detail: No autorizado
    Forbidden:
      description: Rol insuficiente
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DetailError"
          example:
            detail: Acceso restringido a superadmin

  schemas:
    DetailError:
      type: object
      properties:
        detail:
          type: string

    InternalError:
      type: object
      properties:
        error:
          type: string

    InternalPing:
      type: object
      properties:
        ok:
          type: boolean
        service:
          type: string
          example: curation-etl

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          type: object
          properties:
            id:
              type: string
            email:
              type: string
            name:
              type: string
            role:
              type: string

    DeviceListRow:
      type: object
      additionalProperties: true
      description: >-
        Fila device + join customer/site/lectura; risk_bucket expuesto como HIGH/MEDIUM/LOW.

    DeviceDetail:
      type: object
      additionalProperties: true
      properties:
        hardware:
          nullable: true
          type: object
          additionalProperties: true
        active_prediction:
          nullable: true
          type: object
          additionalProperties: true

    DeviceMetricBucket:
      type: object
      properties:
        event_ts:
          type: string
          format: date-time
        cpu_pct:
          type: number
          nullable: true
        cpu_temp_c:
          type: number
          nullable: true
        cpu_temp_c_max:
          type: number
          nullable: true
        mem_used_pct:
          type: number
          nullable: true
        battery_charge_pct:
          type: number
          nullable: true
        risk_score:
          type: number
          nullable: true

    DashboardSummary:
      type: object
      properties:
        total_devices:
          type: integer
        high_risk_devices:
          type: integer
        medium_risk_devices:
          type: integer
        low_risk_devices:
          type: integer
        active_alerts:
          type: integer
        new_today:
          type: integer

    AlertTrendPoint:
      type: object
      required: [hour, cpu_pct, temp_c, battery]
      properties:
        hour:
          type: string
          description: Etiqueta relativa al inicio de ventana
          example: "0d 6h"
        cpu_pct:
          type: number
        temp_c:
          type: number
        battery:
          type: number

    AlertRow:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        device_id:
          type: string
        device_key:
          type: string
        customer_name:
          type: string
        risk_level:
          type: string
        class_prob:
          type: number
          nullable: true
        eta_minutes:
          type: integer
          nullable: true
        predicted_at:
          type: string
          format: date-time

    TicketRow:
      type: object
      additionalProperties: true

    CloseTicketRequest:
      type: object
      required: [outcome]
      properties:
        outcome:
          type: string
          enum: [confirmed_failure, false_positive]
        failure_type:
          type: string
          nullable: true
        notes:
          type: string
          default: ""

    TelemetryIngestFlexible:
      oneOf:
        - $ref: "#/components/schemas/TelemetryIngest"
        - type: object
          description: Snapshot completo del agente
          additionalProperties: true

    TelemetryIngest:
      type: object
      required: [device_key, event_ts_ms, payload]
      properties:
        device_key:
          type: string
        event_ts_ms:
          type: integer
          format: int64
        agent_version:
          type: string
          nullable: true
        schema_version:
          type: string
          nullable: true
        sample_period_s:
          type: integer
          nullable: true
        payload:
          type: object
          additionalProperties: true

    IngestError:
      type: object
      properties:
        error:
          type: string
        details:
          type: array
          items: {}

    # -----------------------------------------------------------------------
    # User schemas
    # -----------------------------------------------------------------------
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [tecnico, analista, admin, superadmin]
        active:
          type: boolean
        created_at:
          type: string
          format: date-time

    UserRequest:
      type: object
      required: [name, email, role, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [tecnico, analista, admin, superadmin]
        password:
          type: string

    UserUpdateRequest:
      type: object
      description: Enviar solo los campos que cambian. Si password se omite o es vacío no se rota el hash.
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [tecnico, analista, admin, superadmin]
        password:
          type: string
          description: Solo actualiza el hash si se provee un valor no vacío

    UserActiveRequest:
      type: object
      required: [active]
      properties:
        active:
          type: boolean

    # -----------------------------------------------------------------------
    # Customer schemas
    # -----------------------------------------------------------------------
    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        ruc:
          type: string
          nullable: true
        contact_email:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    CustomerRequest:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          description: Identificador corto único del cliente
        name:
          type: string
        ruc:
          type: string
          nullable: true
        contact_email:
          type: string
          format: email
          nullable: true

    CustomerUpdateRequest:
      type: object
      description: Al menos uno de los campos es requerido
      properties:
        code:
          type: string
        name:
          type: string
        ruc:
          type: string
          nullable: true
        contact_email:
          type: string
          format: email
          nullable: true

    # -----------------------------------------------------------------------
    # Site schemas
    # -----------------------------------------------------------------------
    Site:
      type: object
      properties:
        id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        name:
          type: string
        address:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        region:
          type: string
          nullable: true
        timezone:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    SiteRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        address:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        region:
          type: string
          nullable: true
        timezone:
          type: string
          nullable: true

    SiteUpdateRequest:
      type: object
      description: Al menos uno de los campos es requerido
      properties:
        name:
          type: string
        address:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        region:
          type: string
          nullable: true
        timezone:
          type: string
          nullable: true

    # -----------------------------------------------------------------------
    # Device Assignment schemas
    # -----------------------------------------------------------------------
    DeviceAssignmentRow:
      type: object
      properties:
        id:
          type: integer
          description: PK bigint
        device_id:
          type: string
          format: uuid
        site_id:
          type: string
          format: uuid
        assigned_at:
          type: string
          format: date-time
        unassigned_at:
          type: string
          format: date-time
          nullable: true
        device_key:
          type: string
          description: Presente en GET (join a devices)
        device_status:
          type: string
          description: Presente en GET (join a devices)
